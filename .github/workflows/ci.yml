name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Deterministic lint, tests, and eval gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra ml --extra chatbot

      - name: Assert torch is absent
        run: uv run python -c "import importlib.util; raise SystemExit(0 if importlib.util.find_spec('torch') is None else 1)"

      - name: Ruff lint
        run: uv run ruff check app model_server ml pipelines tests chatbot

      - name: Classification golden eval
        run: uv run python -m pipelines.classifier.eval_golden

      - name: RAG TF-IDF eval
        run: uv run python -m pipelines.rag.eval_api

      - name: Run tests
        run: uv run pytest -q
