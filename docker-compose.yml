name: handyman

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: handyman
      POSTGRES_USER: handyman
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handyman -d handyman"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault
    # dev mode only — not for production. Use HA Vault in prod.
    command: server -dev
    environment:
      SKIP_SETCAP: "true"
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./docker/vault-init.sh:/vault-init.sh:ro
    entrypoint: ["sh", "/vault-init.sh"]
    restart: "no"

  # ── Database migration ───────────────────────────────────────────────────────

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://handyman:${DB_PASSWORD:-localdev}@db:5432/handyman
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Application services ─────────────────────────────────────────────────────

  api:
    build: .
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318/v1/traces}
      # Redis uses service name, not localhost — required for write_memory tool
      REDIS_URL: redis://redis:6379/0
      # CORS origins for the widget (port 3000) and host demo (port 8080)
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:5173"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      vault-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  model_server:
    build:
      context: .
      dockerfile: docker/model_server.Dockerfile
    ports:
      - "${MODEL_SERVER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chatbot:
    build:
      context: .
      dockerfile: docker/chatbot.Dockerfile
    environment:
      API_BASE_URL: http://api:8000
      MODEL_SERVER_URL: http://model_server:8001
      MODEL_SERVER_PUBLIC_URL: http://localhost:8001
      API_DOCS_URL: http://localhost:8000/docs
      HOST_DEMO_URL: http://localhost:8080
      WIDGET_APP_URL: http://localhost:3000/widget-app/
      JAEGER_URL: http://localhost:16686
      MINIO_URL: http://localhost:9001
    ports:
      - "${CHATBOT_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy

  widget:
    build:
      context: .
      dockerfile: docker/widget.Dockerfile
    ports:
      - "3000:80"

  host:
    build:
      context: .
      dockerfile: docker/host.Dockerfile
    ports:
      - "8080:80"

volumes:
  db_data:
  minio_data:
