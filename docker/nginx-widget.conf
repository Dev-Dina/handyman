server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA under /widget-app/.
    # Files are placed in /usr/share/nginx/html/widget-app/ (dist/ copied there).
    # Vite base='/widget-app/' so index.html references /widget-app/assets/...
    # which resolves correctly under this root.
    location /widget-app/ {
        try_files $uri $uri/ /widget-app/index.html;
    }
}
